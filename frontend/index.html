<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Noa Cobros — Operación mínima</title>
  <link rel="stylesheet" href="style.css">
  <!-- Carga el JS cuando el DOM ya está parseado -->
  <script src="app.js" defer></script>
  <!-- NOA: Config mínima (backend + estilos) -->
<script>
  // Apunta TODO al backend en Render (sin tocar más archivos)
  localStorage.setItem('VITE_API_BASE','https://noa-cobros-backend-clean.onrender.com');
</script>
<style>
  :root{
    --noa-bg:#0a0f1a; --noa-card:#111827; --noa-text:#e5e7eb;
    --noa-muted:#94a3b8; --noa-accent:#00e6ff; --noa-accent-2:#38bdf8;
  }
  body{background:var(--noa-bg);color:var(--noa-text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0}
  .container{max-width:980px;margin:24px auto;padding:16px}
  .card{background:var(--noa-card);border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .btn{display:inline-block;padding:12px 16px;border-radius:12px;border:1px solid transparent;background:var(--noa-accent);color:#001016;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.1)}
  .input, input, select{background:#0b1220;border:1px solid #1f2937;border-radius:10px;color:var(--noa-text);padding:10px 12px}
  .label{color:var(--noa-muted);font-size:12px}
  hr{border-color:#1f2937}
</style>

</head>
<body>
  <header class="topbar">
    <h1>Noa Cobros · Prod</h1>
    <span class="tag">cargar · listar · exportar · cobrar</span>
  </header>

  <!-- 1) Acceso (adorno: guarda token) -->
  <section class="card">
    <h2>1) Acceso (guardar token)</h2>
    <div class="grid">
      <label>Email
        <input id="email" type="email" placeholder="usuario@empresa.com" />
      </label>
      <label>Clave
        <input id="pass" type="password" placeholder="••••••••" />
      </label>
    </div>
    <div class="row">
      <button id="btnLogin">Entrar y guardar token</button>
      <button id="btnProbarToken" class="ghost">Probar token</button>
      <button id="btnBorrarToken" class="danger ghost">Borrar token</button>
      <small id="tokenState" class="muted"></small>
    </div>
  </section>

  <!-- 2) Listado -->
  <section class="card">
    <h2>2) Listado</h2>
    <div class="grid">
      <label>Desde
        <input id="desde" type="date" />
      </label>
      <label>Hasta
        <input id="hasta" type="date" />
      </label>
    </div>
    <div class="row">
      <button id="btnListar">Buscar / Listar</button>
      <button id="btnExportar" class="ghost">Exportar CSV</button>
      <small id="listInfo" class="muted"></small>
    </div>
    <div class="tableWrap">
      <table id="tbl" class="table">
        <thead>
          <tr>
            <th>ID</th><th>Cliente</th><th>Monto</th><th>Vence</th><th>Estado</th><th>Referencia</th><th>Acción</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- 3) Operación: subir CSV -->
  <section class="card">
    <h2>3) Operación (Importar CSV)</h2>
    <p class="muted">Columnas requeridas: <code>cliente,monto,vence</code>. Opcionales: <code>estado,referencia,descripcion</code>.</p>
    <div class="row">
      <input id="fileCSV" type="file" accept=".csv" />
      <button id="btnImportar">Subir e importar</button>
      <small id="importInfo" class="muted"></small>
    </div>
  </section>

  <footer class="foot">
    <small>NOA Cobros · mínimo viable en producción.</small>
  </footer>
</body>
</html>
